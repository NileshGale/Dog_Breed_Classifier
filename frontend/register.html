<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — PawDetect</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }

        @keyframes float { 0%,100%{transform:translateY(0)rotate(0)} 50%{transform:translateY(-20px)rotate(5deg)} }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes liquidFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, -60px) scale(1.1); }
            66% { transform: translate(-50px, 40px) scale(0.95); }
        }
        @keyframes liquidFloat2 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-40%, -60%) scale(1.15); }
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; overflow-x: hidden; padding: 40px 0;
            color: #f0f0ff;
        }

        /* Animated liquid orbs */
        body::before {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, #7c3aed, transparent 70%);
            filter: blur(120px);
            opacity: 0.45;
            top: -10%; left: -10%;
            animation: liquidFloat 20s ease-in-out infinite;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 450px; height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, #ec4899, transparent 70%);
            filter: blur(120px);
            opacity: 0.35;
            bottom: -10%; right: -10%;
            animation: liquidFloat 25s ease-in-out infinite -7s;
            pointer-events: none;
        }
        .fp1 {
            position: fixed; top: 30%; right: 15%;
            font-size: 50px; opacity: 0.08; color: #7c3aed;
            animation: float 8s ease-in-out infinite .5s; pointer-events: none;
        }
        .fp2 {
            position: fixed; bottom: 30%; left: 8%;
            font-size: 70px; opacity: 0.06; color: #06b6d4;
            animation: float 9s ease-in-out infinite 1.5s; pointer-events: none;
        }

        /* Third orb */
        .register-orb-3 {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, #06b6d4, transparent 70%);
            filter: blur(120px);
            opacity: 0.3;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: liquidFloat2 18s ease-in-out infinite;
            pointer-events: none;
        }

        /* Back to Home */
        .back-home {
            position: fixed; top: 22px; left: 22px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 30px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #c4b5fd; text-decoration: none; font-weight: 600; font-size: 14px;
            transition: all 0.3s; z-index: 1000; display: flex; align-items: center; gap: 6px;
            animation: fadeInUp .8s ease;
        }
        .back-home:hover {
            background: rgba(124, 58, 237, 0.15);
            border-color: rgba(124, 58, 237, 0.3);
            transform: translateX(-4px);
            box-shadow: 0 6px 25px rgba(124, 58, 237, 0.2);
            color: #f0f0ff;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800; margin-bottom: 28px; font-size: 2.6rem;
            animation: fadeInUp .8s ease;
            letter-spacing: 1px; text-align: center;
            background: linear-gradient(135deg, #7c3aed, #06b6d4, #ec4899);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h1::before { content: '\f1b0'; font-family: 'Font Awesome 6 Free'; font-weight: 900; margin-right:10px; display:inline-block; animation:float 3s ease-in-out infinite; -webkit-text-fill-color: #7c3aed; }
        h1::after  { content: '\f6d3'; font-family: 'Font Awesome 6 Free'; font-weight: 900; margin-left:10px; display:inline-block; animation:float 3s ease-in-out infinite .5s; -webkit-text-fill-color: #06b6d4; }

        .container { animation:fadeInUp 1s ease .2s backwards; position:relative; z-index:10; width:100%; max-width:440px; padding:0 16px 40px; }

        .form-box {
            background: rgba(255, 255, 255, 0.06);
            padding: 38px 32px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform .3s, box-shadow .3s, border-color .3s;
        }
        .form-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(124, 58, 237, 0.15);
            border-color: rgba(124, 58, 237, 0.2);
        }

        .panel { display:none; }
        .panel.active { display:block; }

        .form-header { margin-bottom: 22px; }
        .form-header h2 { color:#f0f0ff; font-size: 1.7rem; margin-bottom: 6px; font-family: 'Outfit', sans-serif; }
        .form-header p  { color:rgba(255,255,255,0.5); font-size: .88rem; }

        .input-group { margin: 18px 0; }
        .input-group label { display:block; text-align:left; margin-bottom:6px; color:rgba(255,255,255,0.55); font-weight:500; font-size:13px; text-transform:uppercase; letter-spacing:0.04em; }

        .input-group input, .input-group select {
            width:100%; padding:13px 15px;
            border:1.5px solid rgba(255,255,255,0.1);
            border-radius:12px;
            font-size:15px; transition:all .3s;
            background:rgba(255,255,255,0.05);
            color:#f0f0ff;
            font-family:inherit;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.3); }
        .input-group input:focus, .input-group select:focus {
            outline:none;
            border-color:#7c3aed;
            box-shadow:0 0 0 4px rgba(124,58,237,.15);
            background:rgba(255,255,255,0.08);
        }

        /* Prevent browser autofill from overriding the dark style */
        .input-group input:-webkit-autofill,
        .input-group input:-webkit-autofill:hover, 
        .input-group input:-webkit-autofill:focus, 
        .input-group input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px #1a1035 inset !important;
            -webkit-text-fill-color: #f0f0ff !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .input-group input.valid   { border-color:#10b981; }
        .input-group input.invalid { border-color:#ef4444; }

        .pw-reqs { background:rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius:10px; padding:12px 16px; margin-top:10px; font-size:12px; }
        .pw-reqs li { list-style:none; padding:3px 0; color:#ef4444; transition: color 0.3s; }
        .pw-reqs li.ok { color:#10b981; }
        .pw-reqs li::before { content:'\f00d'; font-family: 'Font Awesome 6 Free'; font-weight: 900; margin-right: 8px; }
        .pw-reqs li.ok::before { content:'\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; margin-right: 8px; }

        .hint { font-size:11.5px; margin-top:6px; }
        .hint.ok  { color:#10b981; }
        .hint.err { color:#ef4444; }

        .btn-primary {
            width:100%; padding:14px;
            background:linear-gradient(135deg,#7c3aed,#ec4899);
            color:#fff; border:none; border-radius:14px; cursor:pointer; font-size:15px;
            font-weight:600; font-family:inherit; transition:all .3s;
            box-shadow:0 8px 25px rgba(124, 58, 237, 0.35); margin-top:6px; position:relative; overflow:hidden;
        }
        .btn-primary:hover { transform:translateY(-3px); box-shadow:0 12px 35px rgba(124,58,237,.5); filter:brightness(1.1); }
        .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }

        .btn-text {
            background:none; border:none; color:#c4b5fd; font-size:13px; cursor:pointer;
            font-weight:500; transition:all .3s; padding:4px 0; font-family:inherit;
        }
        .btn-text:hover { color:#f0f0ff; text-shadow:0 0 10px rgba(124,58,237,0.4); }

        .alert { border-radius:12px; padding:11px 14px; font-size:13px; margin:14px 0; display:none; }
        .alert.show { display:block; }
        .alert.error   { background:rgba(239,68,68,0.15); color:#fca5a5; border:1px solid rgba(239,68,68,0.25); }
        .alert.success { background:rgba(16,185,129,0.15); color:#6ee7b7; border:1px solid rgba(16,185,129,0.25); }
        .alert.info    { background:rgba(6,182,212,0.15); color:#67e8f9; border:1px solid rgba(6,182,212,0.25); }

        .otp-inputs { display:flex; gap:8px; justify-content:center; margin:16px 0; }
        .otp-inputs input {
            width:44px; height:52px; text-align:center; font-size:20px; font-weight:700;
            border:1.5px solid rgba(255,255,255,0.1); border-radius:12px; transition:all .3s;
            background:rgba(255,255,255,0.05); color:#f0f0ff;
        }
        .otp-inputs input:focus { outline:none; border-color:#7c3aed; box-shadow:0 0 0 4px rgba(124,58,237,.15); background:rgba(255,255,255,0.08); }

        .timer { font-size:13px; color:rgba(255,255,255,0.4); text-align:center; margin-top:6px; }
        .timer.expired { color:#fca5a5; }

        .login-link { text-align:center; margin-top:20px; font-size:13.5px; color:rgba(255,255,255,0.5); }
        .login-link a { color:#c4b5fd; font-weight:600; text-decoration:none; transition: all 0.3s; }
        .login-link a:hover { color:#f0f0ff; text-shadow:0 0 10px rgba(124,58,237,0.4); }

        @media(max-width:480px) {
            h1 { font-size:2rem; }
            .form-box { padding:28px 20px; }
        }
    </style>
</head>
<body>
    <div class="fp1"><i class="fa-solid fa-paw"></i></div>
    <div class="fp2"><i class="fa-solid fa-paw"></i></div>

    <!-- Back to Home (no back-to-login) -->
    <a href="home_page.html" class="back-home">← <i class="fa-solid fa-house"></i> Home</a>

    <h1>Join PawDetect</h1>

    <div class="container">
        <div class="form-box">

            <!-- ── REGISTER FORM ── -->
            <div id="panelRegister" class="panel active">
                <div class="form-header">
                    <h2>Create Account</h2>
                    <p>Sign up to start identifying dog breeds</p>
                </div>
                <div class="alert" id="regAlert"></div>

                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="full_name" placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password">
                    <ul class="pw-reqs">
                        <li id="req-len">At least 8 characters</li>
                        <li id="req-sym">At least 1 special symbol (!@#$%^&*)</li>
                    </ul>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password">
                    <div class="hint" id="matchHint"></div>
                </div>
                <button class="btn-primary" id="regBtn" onclick="submitRegister()">Register →</button>
                <div class="login-link">Already have an account? <a href="login_page.html">Sign in</a></div>
            </div>

            <!-- ── OTP VERIFICATION ── -->
            <div id="panelOTP" class="panel">
                <div class="form-header">
                    <h2>Verify Email</h2>
                    <p id="otpSentTo" style="color:rgba(255,255,255,0.55);font-size:13px;margin-top:4px">OTP sent to your email</p>
                </div>
                <div class="alert" id="otpAlert"></div>
                <div class="otp-inputs" id="otpBoxes"></div>
                <div class="timer" id="otpTimer"></div>
                <button class="btn-primary" onclick="verifyOTP()"><i class="fa-solid fa-circle-check"></i> Verify &amp; Create Account</button>
                <div style="text-align:center;margin-top:12px">
                    <button class="btn-text" id="resendBtn" onclick="resendOTP()" style="display:none">Resend OTP</button>
                </div>
                <div style="text-align:center;margin-top:8px">
                    <button class="btn-text" onclick="showPanel('panelRegister')">← Back to Registration</button>
                </div>
            </div>

            <!-- ── SUCCESS ── -->
            <div id="panelSuccess" class="panel" style="text-align:center;padding:20px 0">
                <div style="font-size:56px;margin-bottom:16px;color:#10b981"><i class="fa-solid fa-circle-check"></i></div>
                <h2 style="color:#f0f0ff;margin-bottom:8px">Welcome to PawDetect!</h2>
                <p style="color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:24px">Your account has been created successfully.</p>
                <a href="login_page.html" style="text-decoration:none">
                    <button class="btn-primary"><i class="fa-solid fa-key"></i> Go to Login</button>
                </a>
            </div>

        </div>
    </div>

<script>
let pendingEmail = '';
let timerInterval = null;

function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function showAlert(id, msg, type='error') {
    const el = document.getElementById(id);
    el.className = 'alert show ' + type;
    el.textContent = msg;
}
function clearAlert(id) {
    const el = document.getElementById(id);
    el.className = 'alert';
    el.textContent = '';
}

// ── Password validation UI ─────────────────────────────────────────
document.getElementById('password').addEventListener('input', function() {
    const v = this.value;
    document.getElementById('req-len').className = v.length >= 8 ? 'ok' : '';
    document.getElementById('req-sym').className = /[!@#$%^&*(),.?":{}|<>]/.test(v) ? 'ok' : '';
    checkMatch();
});
document.getElementById('confirmPassword').addEventListener('input', checkMatch);

function checkMatch() {
    const pw  = document.getElementById('password').value;
    const cpw = document.getElementById('confirmPassword').value;
    const hint = document.getElementById('matchHint');
    if (!cpw) { hint.textContent = ''; hint.className = 'hint'; return; }
    if (pw === cpw) { hint.innerHTML = '<i class="fa-solid fa-check"></i> Passwords match'; hint.className = 'hint ok'; }
    else            { hint.textContent = '✗ Passwords do not match'; hint.className = 'hint err'; }
}

// ── Submit registration ────────────────────────────────────────────
async function submitRegister() {
    clearAlert('regAlert');
    const fullName       = document.getElementById('fullName').value.trim();
    const email          = document.getElementById('email').value.trim();
    const password       = document.getElementById('password').value;
    const confirmPassword= document.getElementById('confirmPassword').value;
    const btn            = document.getElementById('regBtn');

    if (!fullName)          { showAlert('regAlert','Full name is required.'); return; }
    if (fullName.length < 2){ showAlert('regAlert','Full name must be at least 2 characters.'); return; }
    if (!email)             { showAlert('regAlert','Email is required.'); return; }
    if (password.length < 8){ showAlert('regAlert','Password must be at least 8 characters.'); return; }
    if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) { showAlert('regAlert','Password needs a special character.'); return; }
    if (password !== confirmPassword) { showAlert('regAlert','Passwords do not match.'); return; }

    btn.disabled = true; btn.textContent = 'Sending OTP…';
    const fd = new FormData();
    fd.append('action','register');
    fd.append('full_name', fullName);
    fd.append('email', email);
    fd.append('password', password);
    fd.append('confirmPassword', confirmPassword);

    try {
        const res  = await fetch('../backend/api/register_otp.php', { method:'POST', body:fd });
        const data = await res.json();
        if (data.success) {
            pendingEmail = email;
            document.getElementById('otpSentTo').textContent = 'OTP sent to ' + email;
            buildOTPBoxes('otpBoxes');
            startTimer(600);
            showPanel('panelOTP');
        } else {
            showAlert('regAlert', data.message);
        }
    } catch(e) { showAlert('regAlert','Network error. Please try again.'); }
    finally { btn.disabled = false; btn.textContent = 'Register →'; }
}

// ── Verify OTP ─────────────────────────────────────────────────────
async function verifyOTP() {
    clearAlert('otpAlert');
    const otp = getOTPValue('otpBoxes');
    if (otp.length !== 6) { showAlert('otpAlert','Please enter the complete 6-digit OTP.'); return; }

    const fd = new FormData();
    fd.append('action','verify_otp');
    fd.append('email', pendingEmail);
    fd.append('otp', otp);

    try {
        const res  = await fetch('../backend/api/register_otp.php', { method:'POST', body:fd });
        const data = await res.json();
        if (data.success) {
            clearInterval(timerInterval);
            showPanel('panelSuccess');
        } else {
            showAlert('otpAlert', data.message);
        }
    } catch(e) { showAlert('otpAlert','Network error. Please try again.'); }
}

// ── Resend OTP ─────────────────────────────────────────────────────
async function resendOTP() {
    clearAlert('otpAlert');
    const fd = new FormData();
    fd.append('action','resend_otp'); fd.append('email', pendingEmail);
    try {
        const res  = await fetch('../backend/api/register_otp.php', { method:'POST', body:fd });
        const data = await res.json();
        if (data.success) {
            showAlert('otpAlert', 'New OTP sent!', 'info');
            document.getElementById('resendBtn').style.display = 'none';
            startTimer(600);
        } else {
            showAlert('otpAlert', data.message);
        }
    } catch(e) { showAlert('otpAlert','Network error.'); }
}

// ── OTP input boxes ────────────────────────────────────────────────
function buildOTPBoxes(containerId) {
    const c = document.getElementById(containerId);
    c.innerHTML = '';
    for (let i = 0; i < 6; i++) {
        const inp = document.createElement('input');
        inp.type = 'text'; inp.maxLength = 1; inp.inputMode = 'numeric';
        inp.addEventListener('input', e => {
            inp.value = inp.value.replace(/\D/g,'');
            if (inp.value && i < 5) c.children[i+1].focus();
        });
        inp.addEventListener('keydown', e => {
            if (e.key === 'Enter') verifyOTP();
            if (e.key === 'Backspace' && !inp.value && i > 0) c.children[i-1].focus();
        });
        c.appendChild(inp);
    }
    c.children[0].focus();
}

function getOTPValue(containerId) {
    return [...document.getElementById(containerId).children].map(i => i.value).join('');
}

// ── Countdown timer ────────────────────────────────────────────────
function startTimer(seconds) {
    clearInterval(timerInterval);
    const el  = document.getElementById('otpTimer');
    const btn = document.getElementById('resendBtn');
    btn.style.display = 'none';
    el.className = 'timer';
    let remaining = seconds;
    timerInterval = setInterval(() => {
        remaining--;
        const m = Math.floor(remaining/60).toString().padStart(2,'0');
        const s = (remaining%60).toString().padStart(2,'0');
        el.textContent = `OTP expires in ${m}:${s}`;
        if (remaining <= 0) {
            clearInterval(timerInterval);
            el.textContent = 'OTP expired. Please resend.';
            el.className = 'timer expired';
            btn.style.display = 'inline';
        }
    }, 1000);
}
</script>
</body>
</html>
