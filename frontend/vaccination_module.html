<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawDetect — Vaccination Module</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f5f0e8;
      --bark: #3b2a1a;
      --moss: #4a6741;
      --sand: #c9a96e;
      --rust: #b55a2a;
      --fog: #e8e0d4;
      --leaf: #7a9e6e;
      --blue: #1565c0;
      --blue-light: #e3f2fd;
      --blue-mid: #bbdefb;
    }
    body {
      background-color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--bark);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* NAVBAR */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,240,232,.92); backdrop-filter: blur(12px);
      border-bottom: 1.5px solid var(--fog); padding: 0 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; box-shadow: 0 2px 12px rgba(59,42,26,.07);
    }
    .nav-brand { display: flex; align-items: center; gap: .65rem; text-decoration: none; color: var(--bark); }
    .logo-paw { width: 36px; height: 36px; background: var(--bark); border-radius: 50% 50% 50% 20%; display: flex; align-items: center; justify-content: center; color: var(--cream); font-size: 1.1rem; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 1.45rem; font-weight: 700; letter-spacing: -.02em; }
    .logo-text span { color: var(--rust); }
    .nav-back:hover { background: #ddd8cc; border-color: var(--sand); }

    /* SECONDARY BACK BUTTON */
    .btn-back-wrap { margin-bottom: 2rem; animation: fadeUp .55s ease both; display: flex; justify-content: flex-start; }
    .btn-back {
      display: inline-flex; align-items: center; gap: .6rem;
      text-decoration: none; color: var(--bark);
      font-size: .88rem; font-weight: 500;
      padding: .6rem 1.2rem; 
      background: #fff;
      border: 1.5px solid var(--fog);
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(59,42,26,.05);
      transition: all .2s ease;
      cursor: pointer;
    }
    .btn-back:hover { 
      transform: translateX(-4px);
      border-color: var(--sand);
      box-shadow: 0 6px 16px rgba(59,42,26,.1);
      color: var(--rust);
    }

    /* TOAST */
    #toastContainer { position: fixed; top: 80px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 13px 18px; border-radius: 14px; font-size: .86rem; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,.15); max-width: 300px; display: flex; align-items: center; gap: 10px; animation: toastIn .35s cubic-bezier(0.34,1.56,0.64,1) both; }
    .toast.hide { animation: toastOut .3s ease forwards; }
    .toast.success { background: #1e8449; color: #fff; }
    .toast.error { background: #c0392b; color: #fff; }
    .toast.info { background: var(--bark); color: var(--cream); }
    @keyframes toastIn { from { opacity:0; transform:translateX(60px) } to { opacity:1; transform:translateX(0) } }
    @keyframes toastOut { from { opacity:1; transform:translateX(0) } to { opacity:0; transform:translateX(60px) } }

    /* LAYOUT */
    .page-wrapper { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

    /* HEADER */
    .page-header { text-align: center; margin-bottom: 2.2rem; animation: fadeUp .6s ease both; }
    .page-eyebrow { display: inline-flex; align-items: center; gap: .5rem; background: linear-gradient(135deg, var(--blue-light), var(--blue-mid)); color: var(--blue); font-size: .72rem; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; padding: .35rem 1rem; border-radius: 100px; margin-bottom: 1rem; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,4vw,2.8rem); letter-spacing: -.03em; margin-bottom: .5rem; }
    .page-header h1 em { font-style: italic; color: var(--blue); }
    .page-header p { font-size: .92rem; color: #7a6a58; font-weight: 300; max-width: 480px; margin: 0 auto; line-height: 1.7; }

    /* SEARCH */
    .search-bar-wrap { position: relative; margin-bottom: 2rem; animation: fadeUp .65s ease both; }
    .search-bar { width: 100%; padding: 1rem 1.2rem 1rem 3rem; border: 2px solid var(--fog); border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: .95rem; background: #fff; color: var(--bark); transition: border-color .2s, box-shadow .2s; box-shadow: 0 4px 16px rgba(59,42,26,.06); }
    .search-bar:focus { outline: none; border-color: var(--blue); box-shadow: 0 4px 20px rgba(21,101,192,.15); }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 1.1rem; pointer-events: none; }
    .search-clear { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: var(--fog); border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-size: .8rem; display: none; align-items: center; justify-content: center; transition: background .2s; }
    .search-clear:hover { background: #ddd; }
    .search-clear.visible { display: flex; }

    /* CHIPS */
    .breed-chips { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 2rem; animation: fadeUp .7s ease both; }
    .breed-chip { padding: .35rem .85rem; border-radius: 100px; background: #fff; border: 1.5px solid var(--fog); font-size: .78rem; font-weight: 500; color: var(--bark); cursor: pointer; transition: all .2s; }
    .breed-chip:hover { background: var(--cream); border-color: var(--blue); color: var(--blue); }
    .breed-chip.active { background: linear-gradient(135deg, var(--blue-light), var(--blue-mid)); border-color: #64b5f6; color: var(--blue); }

    /* LOADING / EMPTY */
    .loading-state { text-align: center; padding: 3rem 1rem; color: #9a8a7a; animation: fadeUp .4s ease both; }
    .spinner { width: 20px; height: 20px; border: 2.5px solid var(--fog); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; margin-bottom: .8rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 3rem 1rem; color: #9a8a7a; animation: fadeUp .4s ease both; }
    .empty-icon { font-size: 3rem; margin-bottom: .8rem; }

    /* VACCINE MODULE */
    .vaccine-module { animation: fadeUp .5s ease both; }
    .module-breed-title { display: flex; align-items: center; gap: .8rem; margin-bottom: 1.5rem; }
    .module-breed-icon { font-size: 2rem; }
    .module-breed-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--bark); }
    .module-breed-sub { font-size: .8rem; color: #9a8a7a; margin-top: .1rem; }

    /* PROGRESS TIMELINE */
    .timeline-label { font-size: .78rem; font-weight: 500; color: #9a8a7a; text-transform: uppercase; letter-spacing: .08em; margin-bottom: .8rem; display: flex; align-items: center; gap: .4rem; }

    /* VACCINE CARDS */
    .info-card { background: #fff; border: 1.5px solid var(--fog); border-radius: 20px; padding: 1.4rem; margin-bottom: 1rem; transition: transform .25s, box-shadow .25s; animation: fadeUp .5s ease both; }
    .info-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(59,42,26,.1); }
    .card-header { display: flex; align-items: center; gap: .7rem; margin-bottom: 1rem; }
    .card-icon-wrap { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .icon-blue { background: var(--blue-light); }
    .icon-purple { background: #f3e5f5; }
    .icon-amber { background: #fff8e1; }
    .icon-green { background: #e8f5e9; }
    .card-title { font-weight: 600; font-size: .95rem; color: var(--bark); }
    .card-sub { font-size: .75rem; color: #9a8a7a; margin-top: .1rem; }

    /* VACCINE ROWS */
    .vaccine-row {
      display: flex; align-items: flex-start; gap: .8rem;
      padding: .75rem 0; border-bottom: 1px solid var(--fog);
    }
    .vaccine-row:last-child { border-bottom: none; padding-bottom: 0; }
    .vaccine-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: .35rem; }
    .dot-blue { background: var(--blue); }
    .dot-purple { background: #8e24aa; }
    .vaccine-name { font-weight: 600; font-size: .88rem; color: var(--bark); margin-bottom: .2rem; }
    .vaccine-schedule { font-size: .8rem; color: #7a6a58; line-height: 1.5; }
    .vaccine-when-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .2rem .6rem; border-radius: 100px;
      background: #f3e5f5; color: #8e24aa; font-size: .72rem; font-weight: 500;
      margin-top: .25rem;
    }

    /* DEWORMING CARD */
    .deworming-banner {
      background: linear-gradient(135deg, #fff8e1, #fff3cd);
      border: 1.5px solid #ffe082; border-radius: 20px; padding: 1.2rem 1.4rem;
      margin-bottom: 1rem; display: flex; align-items: flex-start; gap: 1rem;
    }
    .deworming-icon { font-size: 1.8rem; flex-shrink: 0; }
    .deworming-title { font-weight: 600; font-size: .95rem; color: #5d4037; margin-bottom: .25rem; }
    .deworming-text { font-size: .84rem; color: #795548; line-height: 1.5; }

    /* CHECKLIST */
    .checklist { list-style: none; padding: 0; }
    .checklist li { display: flex; align-items: flex-start; gap: .6rem; padding: .45rem 0; font-size: .84rem; color: #5a4a3a; line-height: 1.5; border-bottom: 1px solid var(--fog); }
    .checklist li:last-child { border-bottom: none; }
    .check-icon { flex-shrink: 0; width: 18px; height: 18px; background: linear-gradient(135deg, var(--blue-light), var(--blue-mid)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .6rem; color: var(--blue); margin-top: .1rem; }

    /* NOTE */
    .info-note { display: flex; gap: .6rem; align-items: flex-start; background: #fdf8f3; border: 1px solid var(--sand); border-radius: 14px; padding: 1rem 1.1rem; margin-top: .5rem; font-size: .82rem; color: #6a5a4a; line-height: 1.65; }
    .note-icon { font-size: 1rem; flex-shrink: 0; margin-top: .1rem; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:translateY(0) } }
    @media(max-width:600px) { .navbar { padding: 0 1rem; } .page-wrapper { padding: 2rem 1rem 3rem; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="home_page.html" class="nav-brand">
      <div class="logo-paw"><i class="fa-solid fa-paw"></i></div>
      <div class="logo-text">Paw<span>Detect</span></div>
    </a>
  </nav>

  <div class="page-wrapper">
    <!-- SECONDARY BACK -->
    <div class="btn-back-wrap">
      <a href="detect.html" class="btn-back">← Back to Detection</a>
    </div>
    <div class="page-header">
      <div class="page-eyebrow"><i class="fa-solid fa-syringe"></i> Health Shield</div>
      <h1>Vaccination &amp; <em>Health</em> Guide</h1>
      <p>Core and optional vaccines, deworming schedules, and vet recommendations for every breed.</p>
    </div>



    <div id="contentArea">
      <div class="empty-state">
        <div class="empty-icon"><i class="fa-solid fa-syringe"></i></div>
        <p>Search for a breed above or select one from the quick picks.</p>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script>
    // Check for breed in URL
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const breed = params.get('breed');
      if (breed) {
        loadBreedVaccine(breed);
      }
    });

    function showEmpty() {
      document.getElementById('contentArea').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><i class="fa-solid fa-syringe"></i></div>
          <p>No breed information selected.</p>
        </div>`;
    }

    function showLoading() {
      document.getElementById('contentArea').innerHTML = `
        <div class="loading-state"><div class="spinner"></div><p>Fetching vaccination schedule…</p></div>`;
    }

    async function loadBreedVaccine(breedName) {
      showLoading();
      const key = breedName.toLowerCase().replace(/\s+/g, '_');
      try {
        const res = await fetch('../backend/api/breed_info.php?breed=' + encodeURIComponent(key));
        const data = await res.json();
        if (data.success && data.vaccines) {
          renderVaccines(data.breed_name || breedName, data.vaccines);
        } else {
          showError(data.message || 'No vaccination data found for this breed.');
        }
      } catch (e) {
        showError('Could not reach server. Make sure breed_info.php is running.');
      }
    }

    function showError(msg) {
      document.getElementById('contentArea').innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-triangle-exclamation"></i></div><p>${msg}</p></div>`;
      showToast(msg, 'error');
    }

    function renderVaccines(breedName, vacc) {
      const core = vacc.core_vaccines || [];
      const optional = vacc.optional_vaccines || [];

      let html = `<div class="vaccine-module">
        <div class="module-breed-title">
          <span class="module-breed-icon"><i class="fa-solid fa-dog"></i></span>
          <div>
            <div class="module-breed-name">${breedName}</div>
            <div class="module-breed-sub">Vaccination &amp; Health Schedule</div>
          </div>
        </div>

        <!-- Core Vaccines -->
        <div class="info-card">
          <div class="card-header">
            <div class="card-icon-wrap icon-blue"><i class="fa-solid fa-shield-dog"></i></div>
            <div><div class="card-title">Core Vaccines</div><div class="card-sub">Required for all dogs — non-negotiable</div></div>
          </div>
          ${core.map(v => `
            <div class="vaccine-row">
              <div class="vaccine-dot dot-blue"></div>
              <div>
                <div class="vaccine-name">${v.name}</div>
                <div class="vaccine-schedule">${v.schedule}</div>
              </div>
            </div>`).join('')}
        </div>`;

      if (optional.length > 0) {
        html += `<div class="info-card">
          <div class="card-header">
            <div class="card-icon-wrap icon-purple">➕</div>
            <div><div class="card-title">Optional / Lifestyle Vaccines</div><div class="card-sub">Recommended based on your dog's lifestyle</div></div>
          </div>
          ${optional.map(v => `
            <div class="vaccine-row">
              <div class="vaccine-dot dot-purple"></div>
              <div>
                <div class="vaccine-name">${v.name}</div>
                <div class="vaccine-schedule"><span class="vaccine-when-badge">📅 ${v.when}</span></div>
              </div>
            </div>`).join('')}
        </div>`;
      }

      // Deworming banner
      if (vacc.deworming) {
        html += `<div class="deworming-banner">
          <span class="deworming-icon">🪱</span>
          <div>
            <div class="deworming-title">Deworming Schedule</div>
            <div class="deworming-text">${vacc.deworming}</div>
          </div>
        </div>`;
      }

      // Vet checklist
      html += `<div class="info-card">
        <div class="card-header">
          <div class="card-icon-wrap icon-green"><i class="fa-solid fa-clipboard-list"></i></div>
          <div><div class="card-title">Vet Visit Checklist</div><div class="card-sub">Keep your pup protected</div></div>
        </div>
        <ul class="checklist">
          <li><div class="check-icon">✓</div>Keep vaccination records updated and carry them to every vet visit</li>
          <li><div class="check-icon">✓</div>Schedule annual wellness exams even if no vaccines are due</li>
          <li><div class="check-icon">✓</div>Use tick/flea prevention year-round, especially in endemic areas</li>
          <li><div class="check-icon">✓</div>Ask your vet about heartworm prevention medication</li>
          <li><div class="check-icon">✓</div>Report any adverse reactions after vaccinations immediately</li>
        </ul>
      </div>`;

      if (vacc.special_notes) {
        html += `<div class="info-note">
          <span class="note-icon"><i class="fa-solid fa-triangle-exclamation"></i></span>
          <span><strong>Breed-Specific Note:</strong> ${vacc.special_notes}</span>
        </div>`;
      }

      html += `</div>`;
      document.getElementById('contentArea').innerHTML = html;
      showToast('Vaccine schedule loaded for ' + breedName, 'success');
    }

    function showToast(msg, type = 'info', ms = 3000) {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      const icons = { success:'<i class="fa-solid fa-circle-check"></i>', error:'❌', info:'<i class="fa-solid fa-circle-info"></i>' };
      t.innerHTML = `<span>${icons[type]||'<i class="fa-solid fa-circle-info"></i>'}</span><span>${msg}</span>`;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 400); }, ms);
    }
  </script>
</body>
</html>
