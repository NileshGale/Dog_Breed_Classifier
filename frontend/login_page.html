<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — PawDetect</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        @keyframes float { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-20px) rotate(5deg)} }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes liquidFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, -60px) scale(1.1); }
            66% { transform: translate(-50px, 40px) scale(0.95); }
        }
        @keyframes liquidFloat2 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-40%, -60%) scale(1.15); }
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(124, 58, 237, 0.2); }
            50% { box-shadow: 0 0 40px rgba(124, 58, 237, 0.4); }
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            color: #f0f0ff;
        }

        /* Animated liquid orbs */
        body::before {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, #7c3aed, transparent 70%);
            filter: blur(120px);
            opacity: 0.45;
            top: -10%; left: -10%;
            animation: liquidFloat 20s ease-in-out infinite;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 450px; height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, #ec4899, transparent 70%);
            filter: blur(120px);
            opacity: 0.35;
            bottom: -10%; right: -10%;
            animation: liquidFloat 25s ease-in-out infinite -7s;
            pointer-events: none;
        }
        .fp1 {
            position: fixed; top: 30%; right: 15%;
            font-size: 50px; opacity: 0.08; color: #7c3aed;
            animation: float 8s ease-in-out infinite .5s; pointer-events: none;
        }
        .fp2 {
            position: fixed; bottom: 30%; left: 8%;
            font-size: 70px; opacity: 0.06; color: #06b6d4;
            animation: float 9s ease-in-out infinite 1.5s; pointer-events: none;
        }

        /* Third orb */
        .login-orb-3 {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, #06b6d4, transparent 70%);
            filter: blur(120px);
            opacity: 0.3;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: liquidFloat2 18s ease-in-out infinite;
            pointer-events: none;
        }

        /* Back to Home button */
        .back-home {
            position: fixed;
            top: 22px; left: 22px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #c4b5fd;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all .3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: fadeInUp .8s ease;
        }
        .back-home:hover {
            background: rgba(124, 58, 237, 0.15);
            border-color: rgba(124, 58, 237, 0.3);
            transform: translateX(-4px);
            box-shadow: 0 6px 25px rgba(124, 58, 237, 0.2);
            color: #f0f0ff;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800; margin-bottom: 28px; font-size: 2.6rem;
            animation: fadeInUp .8s ease;
            letter-spacing: 1px; text-align: center;
            background: linear-gradient(135deg, #7c3aed, #06b6d4, #ec4899);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h1::before { content: '\f1b0'; font-family: 'Font Awesome 6 Free'; font-weight: 900; margin-right:10px; display:inline-block; animation:float 3s ease-in-out infinite; -webkit-text-fill-color: #7c3aed; }
        h1::after  { content: '\f6d3'; font-family: 'Font Awesome 6 Free'; font-weight: 900; margin-left:10px; display:inline-block; animation:float 3s ease-in-out infinite .5s; -webkit-text-fill-color: #06b6d4; }

        .container { animation:fadeInUp 1s ease .2s backwards; position:relative; z-index:10; width:100%; max-width:400px; padding:0 16px; }

        .form-box {
            background: rgba(255, 255, 255, 0.06);
            padding: 38px 32px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform .3s, box-shadow .3s, border-color .3s;
        }
        .form-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(124, 58, 237, 0.15);
            border-color: rgba(124, 58, 237, 0.2);
        }

        .form-header h2 { color: #f0f0ff; font-size: 1.7rem; margin-bottom: 6px; font-family: 'Outfit', sans-serif; }
        .form-header p  { color: rgba(255,255,255,0.5); font-size: .88rem; }

        /* Panels */
        .panel { display:none; }
        .panel.active { display:block; }

        .input-group { margin:18px 0; }
        .input-group label { display:block; text-align:left; margin-bottom:6px; color:rgba(255,255,255,0.55); font-weight:500; font-size:13px; text-transform:uppercase; letter-spacing:0.04em; }

        .input-group input {
            width:100%; padding:13px 15px;
            border:1.5px solid rgba(255,255,255,0.1);
            border-radius:12px;
            font-size:15px; transition:all .3s;
            background:rgba(255,255,255,0.05);
            color:#f0f0ff;
            font-family:inherit;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.3); }
        .input-group input:focus {
            outline:none;
            border-color:#7c3aed;
            box-shadow:0 0 0 4px rgba(124,58,237,.15);
            background:rgba(255,255,255,0.08);
        }

        /* Prevent browser autofill from overriding the dark style */
        .input-group input:-webkit-autofill,
        .input-group input:-webkit-autofill:hover, 
        .input-group input:-webkit-autofill:focus, 
        .input-group input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px #1a1035 inset !important;
            -webkit-text-fill-color: #f0f0ff !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .btn-primary {
            width:100%; padding:14px;
            background:linear-gradient(135deg,#7c3aed,#ec4899);
            color:#fff; border:none; border-radius:14px; cursor:pointer; font-size:15px;
            font-weight:600; font-family:inherit; transition:all .3s;
            box-shadow:0 8px 25px rgba(124,58,237,.35); margin-top:6px; position:relative; overflow:hidden;
        }
        .btn-primary:hover { transform:translateY(-3px); box-shadow:0 12px 35px rgba(124,58,237,.5); filter:brightness(1.1); }
        .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }

        .btn-secondary {
            width:100%; padding:14px;
            background:linear-gradient(135deg,#06b6d4,#7c3aed);
            color:#fff; border:none; border-radius:14px; cursor:pointer; font-size:15px;
            font-weight:600; font-family:inherit; transition:all .3s;
            box-shadow:0 8px 25px rgba(6,182,212,.25); margin-top:8px;
        }
        .btn-secondary:hover { transform:translateY(-3px); box-shadow:0 12px 35px rgba(6,182,212,.4); filter:brightness(1.1); }

        .btn-text {
            background:none; border:none; color:#c4b5fd; font-size:13px; cursor:pointer;
            font-weight:500; transition:all .3s; padding:4px 0; font-family:inherit;
        }
        .btn-text:hover { color:#f0f0ff; text-shadow:0 0 10px rgba(124,58,237,0.4); }

        .divider-row { display:flex; justify-content:space-between; align-items:center; margin-top:14px; }

        .or-line { text-align:center; color:rgba(255,255,255,0.3); font-size:13px; margin:18px 0; position:relative; }
        .or-line::before,.or-line::after { content:''; position:absolute; top:50%; width:43%; height:1px; background:rgba(255,255,255,0.1); }
        .or-line::before { left:0; } .or-line::after { right:0; }

        .alert { border-radius:12px; padding:11px 14px; font-size:13px; margin-top:12px; display:none; }
        .alert.error   { background:rgba(239,68,68,0.15); color:#fca5a5; border:1px solid rgba(239,68,68,0.25); display:block; }
        .alert.success { background:rgba(16,185,129,0.15); color:#6ee7b7; border:1px solid rgba(16,185,129,0.25); display:block; }
        .alert.info    { background:rgba(6,182,212,0.15); color:#67e8f9; border:1px solid rgba(6,182,212,0.25); display:block; }

        .otp-inputs { display:flex; gap:8px; justify-content:center; margin:16px 0; }
        .otp-inputs input {
            width:44px; height:52px; text-align:center; font-size:20px; font-weight:700;
            border:1.5px solid rgba(255,255,255,0.1); border-radius:12px; transition:all .3s;
            background:rgba(255,255,255,0.05); color:#f0f0ff;
        }
        .otp-inputs input:focus { outline:none; border-color:#7c3aed; box-shadow:0 0 0 4px rgba(124,58,237,.15); background:rgba(255,255,255,0.08); }

        .timer { font-size:13px; color:rgba(255,255,255,0.4); text-align:center; margin-top:6px; }
        .timer.expired { color:#fca5a5; }

        @media(max-width:480px) {
            h1 { font-size:2rem; }
            .form-box { padding:28px 20px; }
        }
    </style>
</head>
<body>
    <div class="fp1"><i class="fa-solid fa-paw"></i></div>
    <div class="fp2"><i class="fa-solid fa-paw"></i></div>

    <a href="home_page.html" class="back-home">← <i class="fa-solid fa-house"></i> Home</a>

    <h1>PawDetect</h1>

    <div class="container">
        <div class="form-box">
            <!-- ── LOGIN PANEL ── -->
            <div id="panelLogin" class="panel active">
                <div class="form-header" style="margin-bottom:22px">
                    <h2>Sign In</h2>
                    <p>Access your account to continue</p>
                </div>
                <div id="loginAlert"></div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <button class="btn-primary" id="loginBtn" onclick="doLogin()"><i class="fa-solid fa-key"></i> Login</button>
                <div class="divider-row" style="margin-top:14px">
                    <button class="btn-text" onclick="showPanel('panelForgot')">Forgot Password?</button>
                    <button class="btn-text" onclick="showPanel('panelForgotDummy')" style="display:none"></button>
                </div>
                <div class="or-line">OR</div>
                <a href="register.html" style="text-decoration:none">
                    <button class="btn-secondary"><i class="fa-solid fa-wand-magic-sparkles"></i> Create New Account</button>
                </a>
            </div>

            <!-- ── FORGOT PASSWORD: SEND OTP ── -->
            <div id="panelForgot" class="panel">
                <div class="form-header" style="margin-bottom:22px">
                    <h2>Forgot Password</h2>
                    <p>Enter your registered email to receive an OTP</p>
                </div>
                <div id="forgotAlert"></div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="forgotEmail" placeholder="Enter your email">
                </div>
                <button class="btn-primary" id="forgotBtn" onclick="sendForgotOTP()"><i class="fa-solid fa-envelope"></i> Send OTP</button>
                <div style="text-align:center;margin-top:14px">
                    <button class="btn-text" onclick="showPanel('panelLogin')">← Back to Login</button>
                </div>
            </div>

            <!-- ── FORGOT PASSWORD: ENTER OTP ── -->
            <div id="panelForgotOTP" class="panel">
                <div class="form-header" style="margin-bottom:22px">
                    <h2>Enter OTP</h2>
                    <p id="forgotOTPSentTo">OTP sent to your email</p>
                </div>
                <div id="forgotOTPAlert"></div>
                <div class="otp-inputs" id="otpBoxesForgot"></div>
                <div class="timer" id="timerForgot"></div>
                <button class="btn-primary" onclick="verifyForgotOTP()"><i class="fa-solid fa-circle-check"></i> Verify OTP</button>
                <div style="text-align:center;margin-top:10px">
                    <button class="btn-text" id="resendForgotBtn" onclick="resendForgotOTP()">Resend OTP</button>
                </div>
            </div>

            <!-- ── FORGOT PASSWORD: NEW PASSWORD ── -->
            <div id="panelNewPassword" class="panel">
                <div class="form-header" style="margin-bottom:22px">
                    <h2>New Password</h2>
                    <p>Set a strong new password for your account</p>
                </div>
                <div id="newPassAlert"></div>
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="At least 8 chars + special char">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmNewPassword" placeholder="Re-enter new password">
                </div>
                <button class="btn-primary" onclick="resetPassword()"><i class="fa-solid fa-lock"></i> Reset Password</button>
            </div>
        </div>
    </div>

<script>
// ── Panel switcher ─────────────────────────────────────────────────
function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function showAlert(id, msg, type='error') {
    const el = document.getElementById(id);
    el.className = 'alert ' + type;
    el.textContent = msg;
}
function clearAlert(id) {
    const el = document.getElementById(id);
    el.className = 'alert';
    el.textContent = '';
}

// ── LOGIN ──────────────────────────────────────────────────────────
async function doLogin() {
    clearAlert('loginAlert');
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');

    if (!email || !password) { showAlert('loginAlert','Please fill in all fields.'); return; }

    btn.disabled = true; btn.textContent = 'Logging in…';
    const fd = new FormData();
    fd.append('email', email); fd.append('password', password);

    try {
        const res  = await fetch('../backend/api/login.php', { method:'POST', body:fd });
        const data = await res.json();
        if (data.success) {
            sessionStorage.setItem('pawdetect_user_email', data.email);
            sessionStorage.setItem('pawdetect_user_id',    data.user_id);
            sessionStorage.setItem('pawdetect_user_name',  data.full_name);
            showAlert('loginAlert','Login successful! Redirecting…','success');
            setTimeout(() => window.location.href = 'detect.html', 900);
        } else {
            showAlert('loginAlert', data.message);
        }
    } catch(e) { showAlert('loginAlert','Network error. Please try again.'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-key"></i> Login'; }
}

document.getElementById('loginPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
});

// ── FORGOT PASSWORD ────────────────────────────────────────────────
let forgotEmailAddr = '';

async function sendForgotOTP() {
    clearAlert('forgotAlert');
    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) { showAlert('forgotAlert','Please enter your email.'); return; }

    const btn = document.getElementById('forgotBtn');
    btn.disabled = true; btn.textContent = 'Sending…';

    const fd = new FormData();
    fd.append('action','send_otp'); fd.append('email', email);

    try {
        const res  = await fetch('../backend/api/forgot_password.php', { method:'POST', body:fd });
        const data = await res.json();
        if (data.success) {
            forgotEmailAddr = email;
            document.getElementById('forgotOTPSentTo').textContent = 'OTP sent to ' + email;
            buildOTPBoxes('otpBoxesForgot');
            startTimer('timerForgot', 600, 'resendForgotBtn');
            showPanel('panelForgotOTP');
        } else {
            showAlert('forgotAlert', data.message);
        }
    } catch(e) { showAlert('forgotAlert','Network error.'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-envelope"></i> Send OTP'; }
}

async function verifyForgotOTP() {
    clearAlert('forgotOTPAlert');
    const otp = getOTPValue('otpBoxesForgot');
    if (otp.length !== 6) { showAlert('forgotOTPAlert','Please enter the 6-digit OTP.'); return; }

    const fd = new FormData();
    fd.append('action','verify_otp'); fd.append('email', forgotEmailAddr); fd.append('otp', otp);

    const res  = await fetch('../backend/api/forgot_password.php', { method:'POST', body:fd });
    const data = await res.json();
    if (data.success) { showPanel('panelNewPassword'); }
    else { showAlert('forgotOTPAlert', data.message); }
}

async function resendForgotOTP() {
    const fd = new FormData();
    fd.append('action','send_otp'); fd.append('email', forgotEmailAddr);
    const res  = await fetch('../backend/api/forgot_password.php', { method:'POST', body:fd });
    const data = await res.json();
    if (data.success) {
        startTimer('timerForgot', 600, 'resendForgotBtn');
        showAlert('forgotOTPAlert','New OTP sent!','info');
    }
}

async function resetPassword() {
    clearAlert('newPassAlert');
    const pw  = document.getElementById('newPassword').value;
    const cpw = document.getElementById('confirmNewPassword').value;
    if (pw.length < 8)               { showAlert('newPassAlert','Password must be at least 8 characters.'); return; }
    if (!/[!@#$%^&*(),.?":{}|<>]/.test(pw)) { showAlert('newPassAlert','Password needs a special character.'); return; }
    if (pw !== cpw)                   { showAlert('newPassAlert','Passwords do not match.'); return; }

    const fd = new FormData();
    fd.append('action','reset_password'); fd.append('password', pw); fd.append('confirmPassword', cpw);
    const res  = await fetch('../backend/api/forgot_password.php', { method:'POST', body:fd });
    const data = await res.json();
    if (data.success) {
        showAlert('newPassAlert', data.message + ' Redirecting to login…', 'success');
        setTimeout(() => showPanel('panelLogin'), 2000);
    } else {
        showAlert('newPassAlert', data.message);
    }
}

// ── OTP helpers ────────────────────────────────────────────────────
function buildOTPBoxes(containerId) {
    const c = document.getElementById(containerId);
    c.innerHTML = '';
    for (let i = 0; i < 6; i++) {
        const inp = document.createElement('input');
        inp.type = 'text'; inp.maxLength = 1; inp.inputMode = 'numeric';
        inp.addEventListener('input', e => {
            if (/\d/.test(e.target.value) && i < 5) c.children[i+1].focus();
        });
        inp.addEventListener('keydown', e => {
            if (e.key === 'Enter') verifyForgotOTP();
            if (e.key === 'Backspace' && !e.target.value && i > 0) c.children[i-1].focus();
        });
        c.appendChild(inp);
    }
    c.children[0].focus();
}

function getOTPValue(containerId) {
    return [...document.getElementById(containerId).children].map(i => i.value).join('');
}

// ── Countdown timer ────────────────────────────────────────────────
let timerIntervals = {};
function startTimer(timerElId, seconds, resendBtnId) {
    clearInterval(timerIntervals[timerElId]);
    const el  = document.getElementById(timerElId);
    const btn = document.getElementById(resendBtnId);
    if (btn) btn.style.display = 'none';
    let remaining = seconds;
    el.className = 'timer';
    timerIntervals[timerElId] = setInterval(() => {
        remaining--;
        const m = Math.floor(remaining / 60).toString().padStart(2,'0');
        const s = (remaining % 60).toString().padStart(2,'0');
        el.textContent = `OTP expires in ${m}:${s}`;
        if (remaining <= 0) {
            clearInterval(timerIntervals[timerElId]);
            el.textContent = 'OTP expired.';
            el.className = 'timer expired';
            if (btn) btn.style.display = 'inline';
        }
    }, 1000);
}
</script>
</body>
</html>
